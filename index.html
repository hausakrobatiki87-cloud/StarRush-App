<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarRush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .glow-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0033 0%, #050505 100%); z-index: -1; }
        
        .header { margin-top: 50px; text-align: center; }
        #balance { font-size: 3em; font-weight: 800; color: #00d4ff; text-shadow: 0 0 15px #00d4ff; }
        
        .btn { width: 90%; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); color: white; font-size: 1.1em; cursor: pointer; margin: 10px 0; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .btn-ad { background: linear-gradient(135deg, #7000ff, #00d4ff); border: none; }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    
    <div class="header">
        <div style="font-size: 1.2em; opacity: 0.7;">Баланс</div>
        <div id="balance">0</div>
        <div style="font-size: 0.9em;">⭐️ Звезд</div>
    </div>

    <button class="btn btn-ad" id="ad-btn">Смотреть рекламу (+1 ⭐️)</button>
    
    <div style="width: 90%; margin-top: 30px;">
        <h3 style="margin-left: 10px;">Магазин призов</h3>
        <button class="btn" onclick="withdraw('Мишка')">🧸 Мишка — 500 ⭐️</button>
        <button class="btn" onclick="withdraw('Сердце')">❤️ Сердце — 500 ⭐️</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        document.getElementById('balance').innerText = stars;

        function sendToBot(action, item = "") {
            tg.sendData(JSON.stringify({ action: action, item: item }));
        }

        document.getElementById('ad-btn').onclick = () => {
            const ad = window.Adsgram.init({ blockId: "38927" });
            ad.show().then((result) => {
                if(result.done) {
                    stars += 1;
                    document.getElementById('balance').innerText = stars;
                    localStorage.setItem('stars', stars);
                    sendToBot("ad_watched");
                }
            });
        };

        function withdraw(item) {
            if(stars < 500) {
                alert("Нужно 500 звезд!");
                return;
            }
            sendToBot("withdraw", item);
            alert("Заявка отправлена админу!");
        }
    </script>
</body>
</html>
