<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>StarRush</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .stars-container { font-size: 24px; margin-bottom: 20px; }
        #star-count { font-weight: bold; color: #ffd700; }
        
        button {
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            border: none; border-radius: 50px; color: white;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        
        /* Анимация звезд на фоне */
        .star-bg { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="stars-container">Твои звезды: <span id="star-count">0</span></div>
    <button id="ad-button">Смотреть рекламу (+10 звёзд)</button>

    <script>
        const adController = window.Adsgram.init({ blockId: "38927" });
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        const countSpan = document.getElementById("star-count");
        countSpan.innerText = stars;

        document.getElementById("ad-button").addEventListener("click", () => {
            adController.show().then((result) => {
                if (result.done) {
                    stars += 10;
                    countSpan.innerText = stars;
                    localStorage.setItem('stars', stars);
                    alert("Ура! +10 звезд!");
                }
            }).catch((e) => console.error(e));
        });
    </script>
</body>
</html>
