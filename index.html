<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarRush</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        :root { --accent: #7000ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%); z-index: -1; }
        
        .header { text-align: center; margin-top: 40px; }
        #balance { font-size: 3.5em; font-weight: 800; color: #fff; text-shadow: 0 0 20px var(--accent); margin: 10px 0; }
        
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; width: 85%; margin: 10px; }
        
        .btn-main { background: var(--accent); padding: 20px; border-radius: 20px; border: none; color: white; font-size: 1.2em; font-weight: bold; width: 100%; box-shadow: 0 0 20px rgba(112, 0, 255, 0.4); transition: 0.3s; cursor: pointer; }
        .btn-main:active { transform: scale(0.96); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-top: 20px; }
        .item { background: var(--glass); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .item button { background: #333; color: white; border: none; padding: 8px; border-radius: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="header">
        <div>Ваш баланс</div>
        <div id="balance">0</div>
        <div>⭐️ Звезд</div>
    </div>

    <div class="card">
        <button class="btn-main" id="ad-btn">Смотреть рекламу (+10 ⭐️)</button>
    </div>

    <div class="grid">
        <div class="item">🧸 Мишка<br><small>15 ⭐️</small><br><button onclick="withdraw('Мишка')">Взять</button></div>
        <div class="item">❤️ Сердце<br><small>15 ⭐️</small><br><button onclick="withdraw('Сердце')">Взять</button></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let stars = parseInt(localStorage.getItem('stars')) || 0;
        document.getElementById('balance').innerText = stars;

        document.getElementById('ad-btn').onclick = () => {
            const ad = window.Adsgram.init({ blockId: "38927" });
            ad.show().then((result) => {
                if(result.done) {
                    stars += 10;
                    updateUI();
                }
            });
        };

        function updateUI() {
            document.getElementById('balance').innerText = stars;
            localStorage.setItem('stars', stars);
        }

        function withdraw(item) {
            if(stars < 15) return alert("Недостаточно звезд!");
            stars -= 15;
            updateUI();
            tg.sendData(JSON.stringify({ action: 'withdraw', item: item }));
            alert("Заявка на " + item + " отправлена!");
        }
    </script>
</body>
</html>
